<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Formulários Informática</title>
  <meta name="description" content="Acesso autenticado aos formulários de Informática.">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero__logo-wrap">
        <img src="/assets/logo-grupo.png" alt="Logos Radiológica e Examina" class="hero__logo">
      </div>
      <div class="hero__content">
        <span class="hero__eyebrow">Formulários Informática</span>
        <h1>Acesso restrito ao setor de informática</h1>
        <div class="page-actions">
          <a href="/index.html" class="btn-link">← Voltar para a central</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="login-shell" aria-labelledby="titulo-login-informatica">
        <div class="login-card">
          <div class="login-card__header">
            <h2 id="titulo-login-informatica">Login</h2>
          </div>

          <form id="loginForm" class="login-form" novalidate>
            <div class="field">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" placeholder="voce@empresa.com.br" required>
            </div>

            <div class="field">
              <label for="password">Senha</label>
              <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-submit">Entrar</button>
            </div>

            <div class="form-extra">
             <a href="/formularios/informatica/forgot-password/index.html">Esqueci minha senha</a>
            </div>

            <div id="mensagemLogin" class="form-message" aria-live="polite"></div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Grupo Examina e Radiológica</p>
    </footer>
  </div>

  <script src="/assets/supabase-config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
