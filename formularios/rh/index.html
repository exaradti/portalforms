<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitações ao RH</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="/assets/logo-grupo.png" class="logo" alt="Grupo Examina e Radiológica">
      <h1>Solicitações ao RH</h1>
      <p>Preencha o formulário abaixo para enviar sua solicitação.</p>
    </header>

    <form id="formRH" novalidate>
      <div class="form-group">
        <label for="nome">Nome completo <span class="required">*</span></label>
        <input type="text" id="nome" name="nome" required>
        <small class="error" id="erro-nome"></small>
      </div>

      <div class="form-group">
        <label for="email">E-mail para retorno <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="nome@exemplo.com"
          required
        >
        <small class="error" id="erro-email"></small>
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de solicitação <span class="required">*</span></label>
        <select id="tipo" name="tipo" required>
          <option value="">Selecione</option>

          <option value="Trocar vale transporte por vale mobilidade">
            Trocar vale transporte por vale mobilidade
          </option>

          <option value="Trocar vale mobilidade por vale transporte">
            Trocar vale mobilidade por vale transporte
          </option>

          <option value="Fazer inscrição no plano de saúde">
            Fazer inscrição no plano de saúde
          </option>

          <option value="Cancelar plano de saúde">
            Cancelar plano de saúde
          </option>

          <option value="Fazer segunda via de crachá">
            Fazer segunda via de crachá
          </option>

          <option value="Fazer segunda via do cartão Partiu">
            Fazer segunda via do cartão Partiu
          </option>

          <option value="Recuperar o acesso ao APP Sólides">
            Recuperar o acesso ao APP Sólides
          </option>

          <option value="Receber contracheque por email">
            Receber contracheque por email
          </option>

          <option value="Receber extrato de consumo do plano por email">
            Receber extrato de consumo do plano por email
          </option>

          <option value="Receber informe de rendimentos por email">
            Receber informe de rendimentos por email
          </option>

          <option value="Solicitação de uniforme">
            Solicitação de uniforme
          </option>

          <option value="Agendar reunião">
            Agendar reunião
          </option>

          <option value="Outro">
            Outro
          </option>
        </select>
        <small class="error" id="erro-tipo"></small>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição da solicitação</label>
        <textarea
          id="descricao"
          name="descricao"
          rows="6"
          placeholder="Descreva sua solicitação, se desejar."
        ></textarea>
        <small class="error" id="erro-descricao"></small>
      </div>

      <button type="submit" class="btn">Enviar solicitação</button>
      <p id="msg" class="msg"></p>
    </form>

    <a href="/" class="back">← Voltar</a>
  </div>

  <script src="./app.js"></script>
</body>
</html>
